<!DOCTYPE html>
<html>

<style>
@import url('https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=Noto+Sans+Devanagari:wght@400;500;600&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0d0d0d;font-family:'Sora',sans-serif;color:#f0ede8;padding:20px 12px 40px;}
.page-title{text-align:center;font-size:17px;font-weight:700;margin-bottom:4px;letter-spacing:-0.02em;}
.page-sub{text-align:center;font-size:11px;color:#555;margin-bottom:16px;font-family:'Noto Sans Devanagari',sans-serif;}

/* Tabs */
.tabs-row{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-bottom:20px;}
.tab{padding:6px 13px;border-radius:18px;font-size:10px;font-weight:600;border:1px solid #2a2a2a;background:#111;color:#666;cursor:pointer;transition:all .2s;white-space:nowrap;}
.tab.active{background:#e8472a;border-color:#e8472a;color:#fff;}

/* Phone */
.phone-wrap{display:flex;justify-content:center;}
.phone{width:240px;background:#111;border-radius:36px;border:2px solid #2a2a2a;overflow:hidden;box-shadow:0 24px 60px rgba(0,0,0,.7);}
.status-bar{display:flex;justify-content:space-between;padding:10px 16px 4px;font-size:10px;color:#888;}
.screen{background:#0f0f0f;min-height:480px;}

/* Shared */
.topbar{display:flex;align-items:center;gap:8px;padding:10px 14px 8px;border-bottom:1px solid #1a1a1a;}
.tb-back{width:24px;height:24px;background:#1e1e1e;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:11px;cursor:pointer;}
.tb-title{font-size:12px;font-weight:600;flex:1;}
.tb-badge{padding:3px 8px;border-radius:6px;font-size:8px;font-weight:600;}
.badge-admin{background:#e8472a22;border:1px solid #e8472a44;color:#e8472a;}
.badge-warn{background:#e8c84a22;border:1px solid #e8c84a44;color:#e8c84a;}
.badge-ok{background:#4caf7d22;border:1px solid #4caf7d44;color:#4caf7d;}

.sec-hdr{display:flex;justify-content:space-between;align-items:center;padding:0 14px;margin-bottom:7px;}
.sec-title{font-size:10px;font-weight:600;}
.sec-action{font-size:8px;color:#e8472a;cursor:pointer;}

/* Stat cards */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:10px 14px;}
.stat-card{background:#161616;border:1px solid #1e1e1e;border-radius:11px;padding:10px;}
.stat-label{font-size:7px;color:#555;margin-bottom:3px;text-transform:uppercase;letter-spacing:.06em;}
.stat-val{font-size:20px;font-weight:700;}
.stat-val.red{color:#e8472a;}
.stat-val.green{color:#4caf7d;}
.stat-val.amber{color:#e8c84a;}
.stat-val.blue{color:#378ADD;}
.stat-sub{font-size:7px;color:#555;margin-top:2px;}
.stat-sub.up{color:#4caf7d;}
.stat-sub.down{color:#e8472a;}

/* Pending shop card */
.pending-card{margin:0 14px 7px;background:#161616;border-left:3px solid #e8c84a;border-radius:0 10px 10px 0;border-top:1px solid #1e1e1e;border-right:1px solid #1e1e1e;border-bottom:1px solid #1e1e1e;padding:9px 10px;}
.pc-name{font-size:10px;font-weight:600;margin-bottom:2px;}
.pc-meta{font-size:8px;color:#666;margin-bottom:6px;line-height:1.5;font-family:'Noto Sans Devanagari',sans-serif;}
.pc-actions{display:flex;gap:6px;}
.btn-approve{background:#1a2a1a;border:1px solid #2a4a2a;color:#4caf7d;font-size:8px;padding:4px 11px;border-radius:6px;cursor:pointer;font-weight:600;}
.btn-reject{background:#2a1a1a;border:1px solid #4a2a2a;color:#e8472a;font-size:8px;padding:4px 11px;border-radius:6px;cursor:pointer;font-weight:600;}
.btn-view{background:#1a1a2a;border:1px solid #2a2a4a;color:#7777dd;font-size:8px;padding:4px 11px;border-radius:6px;cursor:pointer;font-weight:600;}

/* Shop list row */
.shop-row{margin:0 14px 6px;background:#161616;border:1px solid #1e1e1e;border-radius:10px;padding:8px 10px;display:flex;align-items:center;gap:8px;cursor:pointer;}
.shop-avatar{width:32px;height:32px;border-radius:9px;background:#1e1e1e;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
.shop-info{flex:1;}
.shop-nm{font-size:10px;font-weight:500;margin-bottom:2px;}
.shop-meta2{font-size:8px;color:#666;display:flex;gap:6px;}
.dot-green{color:#4caf7d;}
.dot-red{color:#e8472a;}
.dot-amber{color:#e8c84a;}
.shop-rev{font-size:9px;font-weight:600;color:#4caf7d;}
.shop-arrow{font-size:11px;color:#333;}

/* Bar chart */
.bar-row{padding:0 14px;margin-bottom:5px;display:flex;align-items:center;gap:8px;}
.bar-lbl{font-size:8px;color:#888;width:50px;flex-shrink:0;text-align:right;}
.bar-track{flex:1;height:7px;background:#1a1a1a;border-radius:4px;overflow:hidden;}
.bar-fill{height:100%;border-radius:4px;background:#e8472a;}
.bar-fill.green{background:#4caf7d;}
.bar-fill.amber{background:#e8c84a;}
.bar-val{font-size:8px;color:#888;width:28px;text-align:right;}

/* Booking rows */
.bk-row{margin:0 14px 5px;background:#161616;border:1px solid #1e1e1e;border-radius:9px;padding:7px 10px;display:flex;align-items:center;gap:8px;}
.bk-avatar{width:26px;height:26px;border-radius:7px;background:#222;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;}
.bk-info{flex:1;}
.bk-name{font-size:9px;font-weight:500;}
.bk-meta{font-size:7px;color:#666;}
.bk-status{padding:2px 7px;border-radius:5px;font-size:7px;font-weight:600;}
.st-done{background:#1a2a1a;color:#4caf7d;}
.st-pend{background:#2a2a0a;color:#e8c84a;}
.st-live{background:#2a1a1a;color:#e8472a;}
.st-cancel{background:#1e1e1e;color:#555;}

/* Broadcast */
.broadcast-box{margin:0 14px 8px;background:#161616;border:1px solid #1e1e1e;border-radius:11px;padding:11px;}
.bc-label{font-size:9px;font-weight:600;margin-bottom:8px;}
.bc-textarea{background:#1a1a1a;border:1.5px solid #e8472a;border-radius:9px;padding:8px 10px;font-size:9px;color:#f0ede8;margin-bottom:8px;line-height:1.5;font-family:'Noto Sans Devanagari',sans-serif;}
.target-row{display:flex;gap:5px;margin-bottom:8px;flex-wrap:wrap;}
.target{padding:4px 9px;border-radius:6px;font-size:8px;font-weight:600;border:1px solid #2a2a2a;color:#666;cursor:pointer;}
.target.on{border-color:#e8472a44;background:#e8472a22;color:#e8472a;}
.target.city{border-color:#378ADD44;background:#378ADD22;color:#378ADD;}
.bc-send{background:#e8472a;border-radius:9px;padding:9px;text-align:center;font-size:10px;font-weight:600;cursor:pointer;font-family:'Noto Sans Devanagari',sans-serif;}
.bc-preview{background:#1a1a0a;border:1px solid #2a2a1a;border-radius:9px;padding:8px 10px;margin-bottom:8px;}
.bc-prev-label{font-size:7px;color:#e8c84a;margin-bottom:3px;}
.bc-prev-text{font-size:9px;color:#888;font-family:'Noto Sans Devanagari',sans-serif;line-height:1.5;}

/* User detail */
.user-detail-card{margin:0 14px 8px;background:#161616;border:1px solid #1e1e1e;border-radius:12px;overflow:hidden;}
.udc-header{background:#1a1a1a;padding:10px 12px;display:flex;align-items:center;gap:10px;}
.udc-avatar{width:36px;height:36px;border-radius:10px;background:#2a2a2a;display:flex;align-items:center;justify-content:center;font-size:16px;}
.udc-name{font-size:11px;font-weight:600;}
.udc-sub{font-size:8px;color:#666;}
.udc-row{display:flex;padding:7px 12px;border-bottom:1px solid #1a1a1a;align-items:center;gap:8px;}
.udc-row:last-child{border-bottom:none;}
.udc-key{font-size:8px;color:#555;width:70px;flex-shrink:0;font-family:'Noto Sans Devanagari',sans-serif;}
.udc-val{font-size:9px;font-weight:500;flex:1;}
.action-strip{display:flex;gap:6px;padding:8px 14px;}
.as-btn{flex:1;padding:8px;border-radius:9px;text-align:center;font-size:8px;font-weight:600;cursor:pointer;}
.as-suspend{background:#2a1a1a;border:1px solid #4a2a2a;color:#e8472a;}
.as-msg{background:#1a1a2a;border:1px solid #2a2a4a;color:#7777dd;}
.as-ok{background:#1a2a1a;border:1px solid #2a4a2a;color:#4caf7d;}

/* Revenue card */
.rev-card{margin:0 14px 8px;background:#161616;border:1px solid #1e1e1e;border-radius:12px;padding:12px;}
.rev-main{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:10px;}
.rev-val{font-size:24px;font-weight:700;color:#4caf7d;}
.rev-period{font-size:8px;color:#555;}
.mini-bars{display:flex;gap:4px;align-items:flex-end;height:40px;}
.mini-bar{flex:1;border-radius:3px 3px 0 0;background:#e8472a;opacity:.7;}
.mini-bar.today{opacity:1;background:#4caf7d;}

/* Bottom nav */
.bottom-nav{display:flex;background:#111;border-top:1px solid #1e1e1e;padding:8px 0 10px;}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;}
.nav-lbl{font-size:7px;color:#555;}
.nav-item.active .nav-lbl{color:#e8472a;}
.nav-dot{width:4px;height:4px;background:#e8472a;border-radius:50%;}

/* Desc */
.step-desc{text-align:center;margin:14px auto 0;max-width:320px;}
.step-desc-title{font-size:13px;font-weight:600;margin-bottom:4px;}
.step-desc-body{font-size:10px;color:#555;line-height:1.6;font-family:'Noto Sans Devanagari',sans-serif;}

/* Nav buttons */
.nav-row{display:flex;gap:10px;justify-content:center;margin-top:18px;}
.nav-btn{padding:8px 22px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:none;font-family:'Sora',sans-serif;}
.btn-prev{background:#1e1e1e;color:#888;border:1px solid #2a2a2a;}
.btn-next{background:#e8472a;color:#fff;}

let cur = 0;
const total = 7;

function render(){
  document.getElementById('screenArea').innerHTML = screens[cur];
  const d = descs[cur];
  document.getElementById('stepDesc').innerHTML =
    `<div class="step-desc-title">${d.title}</div>
     <div class="step-desc-body">${d.body}</div>
     <div class="bot-equiv">🤖 ${d.bot}</div>`;
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',i===cur));
  [0,1,2,3,4].forEach(i=>{
    const n=document.getElementById('nav'+i);
    n.classList.remove('active');
    const dot=n.querySelector('.nav-dot');
    if(dot)dot.remove();
  });
  const navMap=[0,1,1,1,2,3,4];
  const ni=document.getElementById('nav'+navMap[cur]);
  ni.classList.add('active');
  if(!ni.querySelector('.nav-dot')){const d2=document.createElement('div');d2.className='nav-dot';ni.appendChild(d2);}
  document.getElementById('prevBtn').style.display=cur===0?'none':'';
  document.getElementById('nextBtn').textContent=cur===total-1?'🔄 Phir se':'Aage →';
}

function next(){cur=cur===total-1?0:cur+1;render();}
function prev(){if(cur>0){cur--;render();}}
function goTab(i,el){cur=i;render();}

render();
