<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CutBook — Login</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0d0d0d;font-family:'Segoe UI',sans-serif;color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.container{width:100%;max-width:360px;}
.logo-wrap{text-align:center;padding:32px 22px 28px;}
.logo-icon{width:56px;height:56px;background:#E8472A;border-radius:18px;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;}
.logo-name{font-size:22px;font-weight:600;margin-bottom:4px;}
.logo-sub{font-size:13px;color:#666;}
.options{display:flex;flex-direction:column;gap:14px;padding:0 20px;}
.option-card{background:#1e1e1e;border-radius:16px;padding:20px 18px;cursor:pointer;}
.option-card.selected{border:2px solid #E8472A;}
.option-card:not(.selected){border:1px solid #2a2a2a;}
.option-inner{display:flex;align-items:center;gap:14px;}
.option-icon{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.option-icon.customer{background:#2a1a1a;}
.option-icon.barber{background:#1e2a1e;}
.option-text{flex:1;}
.option-title{font-size:14px;font-weight:500;margin-bottom:3px;}
.option-sub{font-size:11px;color:#888;}
.radio{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.radio.selected{border:2px solid #E8472A;}
.radio-dot{width:10px;height:10px;border-radius:50%;background:#E8472A;}
.radio.unselected{border:2px solid #2a2a2a;}
.cta-wrap{padding:24px 20px 20px;}
.cta-btn{background:#E8472A;border-radius:13px;padding:14px;text-align:center;cursor:pointer;font-size:15px;font-weight:500;width:100%;border:none;color:#fff;font-family:inherit;}
.back-btn{background:none;border:none;color:#888;font-size:13px;cursor:pointer;margin-bottom:20px;padding:0;display:block;}
.phone-input{display:flex;background:#1e1e1e;border:1px solid #2a2a2a;border-radius:10px;overflow:hidden;margin-bottom:14px;}
.phone-prefix{padding:12px 14px;color:#666;border-right:1px solid #2a2a2a;font-size:13px;}
.phone-field{flex:1;background:transparent;border:none;outline:none;color:#fff;font-size:13px;padding:12px 14px;font-family:inherit;}
.otp-inputs{display:flex;gap:8px;margin-bottom:20px;}
.otp-box{flex:1;height:50px;background:#1e1e1e;border:1px solid #2a2a2a;border-radius:10px;text-align:center;font-size:20px;font-weight:600;color:#fff;outline:none;font-family:inherit;}
.otp-box:focus{border-color:#E8472A;}
.msg{font-size:12px;color:#888;text-align:center;margin-bottom:14px;min-height:18px;}
.msg.error{color:#E05555;}
.msg.success{color:#3DBB78;}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px;}
@keyframes spin{to{transform:rotate(360deg)}}
.field-label{font-size:11px;color:#888;margin-bottom:6px;}
</style>
</head>
<body>
<div class="container">

  <!-- Screen 1: Role -->
  <div id="screen-role">
    <div class="logo-wrap">
      <div class="logo-icon">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8"><path d="M12 2C8 2 5 5 5 9c0 5 7 13 7 13s7-8 7-13c0-4-3-7-7-7z"/><circle cx="12" cy="9" r="2.5"/></svg>
      </div>
      <div class="logo-name">CutBook</div>
      <div class="logo-sub">Aap kaun hain?</div>
    </div>
    <div class="options">
      <div class="option-card selected" id="card-customer" onclick="selectRole('customer')">
        <div class="option-inner">
          <div class="option-icon customer">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#E8472A" stroke-width="1.6"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
          </div>
          <div class="option-text">
            <div class="option-title">Customer</div>
            <div class="option-sub">Salon book karna hai</div>
          </div>
          <div class="radio selected" id="radio-customer"><div class="radio-dot"></div></div>
        </div>
      </div>
      <div class="option-card" id="card-barber" onclick="selectRole('shopkeeper')">
        <div class="option-inner">
          <div class="option-icon barber">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#4caf50" stroke-width="1.6"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg>
          </div>
          <div class="option-text">
            <div class="option-title">Barber Shop</div>
            <div class="option-sub">Apni dukan register / login</div>
          </div>
          <div class="radio unselected" id="radio-barber"></div>
        </div>
      </div>
    </div>
    <div class="cta-wrap">
      <button class="cta-btn" onclick="showScreen('phone')">Aage badho →</button>
    </div>
  </div>

  <!-- Screen 2: Phone -->
  <div id="screen-phone" style="display:none;padding:20px;">
    <button class="back-btn" onclick="showScreen('role')">← Wapas</button>
    <div style="font-size:20px;font-weight:600;margin-bottom:4px;">Phone number daalo</div>
    <div style="font-size:12px;color:#666;margin-bottom:24px;">OTP SMS se aayega</div>
    <div class="field-label">Mobile Number</div>
    <div class="phone-input">
      <div class="phone-prefix">+91</div>
      <input class="phone-field" id="phone-input" type="tel" maxlength="10" placeholder="98765 43210" oninput="this.value=this.value.replace(/\D/g,'')">
    </div>
    <div id="phone-msg" class="msg"></div>
    <button class="cta-btn" onclick="sendOTP()">OTP Bhejo</button>
  </div>

  <!-- Screen 3: OTP -->
  <div id="screen-otp" style="display:none;padding:20px;">
    <button class="back-btn" onclick="showScreen('phone')">← Wapas</button>
    <div style="font-size:20px;font-weight:600;margin-bottom:4px;">OTP verify karo</div>
    <div style="font-size:12px;color:#666;margin-bottom:24px;" id="otp-sent-to"></div>
    <div class="otp-inputs">
      <input class="field-input" id="otp-single" type="tel" maxlength="6" placeholder="6 अंकों का OTP डालें" style="letter-spacing:8px;font-size:20px;font-weight:600;text-align:center;width:100%;background:var(--bg3,#1e1e1e);border:1px solid #2a2a2a;border-radius:10px;padding:14px;color:#fff;outline:none;font-family:inherit;">
    </div>
    <div id="otp-msg" class="msg"></div>
    <button class="cta-btn" onclick="verifyOTP()">Verify karo</button>
    <div style="text-align:center;margin-top:14px;font-size:12px;color:#555;">
      OTP nahi aaya? <span style="color:#E8472A;cursor:pointer;" onclick="sendOTP()">Dobara bhejo</span>
    </div>
  </div>

</div>
<script>
const SUPABASE_URL = 'https://kovpsqdkrlgwyfrqlhry.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtvdnBzcWRrcmxnd3lmcnFsaHJ5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1MTg3MDAsImV4cCI6MjA5MDA5NDcwMH0.poZR0KcozCyL1xSo3mFi_yle5bRNhM4TWe1nWfvVx30';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let selectedRole = 'customer';
let phoneNumber = '';

function selectRole(role){
  selectedRole = role;
  document.getElementById('card-customer').className = 'option-card'+(role==='customer'?' selected':'');
  document.getElementById('radio-customer').className = 'radio'+(role==='customer'?' selected':' unselected');
  document.getElementById('radio-customer').innerHTML = role==='customer'?'<div class="radio-dot"></div>':'';
  document.getElementById('card-barber').className = 'option-card'+(role==='shopkeeper'?' selected':'');
  document.getElementById('radio-barber').className = 'radio'+(role==='shopkeeper'?' selected':' unselected');
  document.getElementById('radio-barber').innerHTML = role==='shopkeeper'?'<div class="radio-dot"></div>':'';
}

function showScreen(name){
  ['role','phone','otp'].forEach(s=>{
    document.getElementById('screen-'+s).style.display = s===name?'block':'none';
  });
}

async function sendOTP(){
  const ph = document.getElementById('phone-input').value.trim();
  if(ph.length!==10){setMsg('phone-msg','❌ 10 digit ka number daalo','error');return;}
  phoneNumber = '+91'+ph;
  setMsg('phone-msg','<span class="spinner"></span> OTP bheja ja raha hai...','');
  const {error} = await sb.auth.signInWithOtp({phone:phoneNumber});
  if(error){setMsg('phone-msg','❌ '+error.message,'error');return;}
  document.getElementById('otp-sent-to').textContent = phoneNumber+' pe OTP bheja gaya';
  showScreen('otp');
  document.getElementById('otp-single').focus();
}

async function verifyOTP(){
  const otp = document.getElementById('otp-single').value.trim();
  if(otp.length!==6){setMsg('otp-msg','❌ 6 digit OTP daalo','error');return;}
  setMsg('otp-msg','<span class="spinner"></span> Verify ho raha hai...','');
  const {data,error} = await sb.auth.verifyOtp({phone:phoneNumber,token:otp,type:'sms'});
  if(error){setMsg('otp-msg','❌ Galat OTP — dobara try karo','error');return;}
  await sb.from('users').upsert({id:data.user.id,phone:phoneNumber,role:selectedRole},{onConflict:'id'});
  localStorage.setItem('cb_role', selectedRole);
  localStorage.setItem('cb_phone', phoneNumber);
  window.location.href = selectedRole==='customer' ? 'customer/index.html' : 'shopkeeper/index.html';
}

function otpNext(i){
  if(document.getElementById('otp'+i).value && i<5) document.getElementById('otp'+(i+1)).focus();
}

function setMsg(id,html,cls){
  const el=document.getElementById(id);
  el.innerHTML=html;
  el.className='msg '+cls;
}
</script>
</body>
</html>
