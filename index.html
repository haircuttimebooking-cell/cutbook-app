<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CutBook — Login</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0d0d0d;font-family:'Segoe UI',sans-serif;color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}

.container{width:100%;max-width:360px;}

.logo-wrap{text-align:center;padding:32px 22px 28px;}
.logo-icon{width:56px;height:56px;background:#E8472A;border-radius:18px;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;}
.logo-name{font-size:22px;font-weight:600;margin-bottom:4px;}
.logo-sub{font-size:13px;color:#666;}

.options{display:flex;flex-direction:column;gap:14px;padding:0 20px;}

.option-card{background:#1e1e1e;border-radius:16px;padding:20px 18px;cursor:pointer;transition:border 0.2s;}
.option-card.selected{border:2px solid #E8472A;}
.option-card:not(.selected){border:1px solid #2a2a2a;}
.option-inner{display:flex;align-items:center;gap:14px;}
.option-icon{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.option-icon.customer{background:#2a1a1a;}
.option-icon.barber{background:#1e2a1e;}
.option-text{flex:1;}
.option-title{font-size:14px;font-weight:500;margin-bottom:3px;}
.option-sub{font-size:11px;color:#888;line-height:1.4;}
.radio{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.radio.selected{border:2px solid #E8472A;}
.radio-dot{width:10px;height:10px;border-radius:50%;background:#E8472A;}
.radio.unselected{border:2px solid #2a2a2a;}

.cta-wrap{padding:24px 20px 20px;}
.cta-btn{background:#E8472A;border-radius:13px;padding:14px;text-align:center;cursor:pointer;font-size:15px;font-weight:500;width:100%;border:none;color:#fff;font-family:inherit;}
.cta-btn:hover{opacity:0.9;}
</style>
</head>
<body>

<div class="container">
  <div class="logo-wrap">
    <div class="logo-icon">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8"><path d="M12 2C8 2 5 5 5 9c0 5 7 13 7 13s7-8 7-13c0-4-3-7-7-7z"/><circle cx="12" cy="9" r="2.5"/></svg>
    </div>
    <div class="logo-name">CutBook</div>
    <div class="logo-sub">Aap kaun hain?</div>
  </div>

  <div class="options">
    <div class="option-card selected" id="card-customer" onclick="select('customer')">
      <div class="option-inner">
        <div class="option-icon customer">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#E8472A" stroke-width="1.6"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
        </div>
        <div class="option-text">
          <div class="option-title">Customer</div>
          <div class="option-sub">Salon book karna hai</div>
        </div>
        <div class="radio selected" id="radio-customer">
          <div class="radio-dot"></div>
        </div>
      </div>
    </div>

    <div class="option-card" id="card-barber" onclick="select('barber')">
      <div class="option-inner">
        <div class="option-icon barber">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#4caf50" stroke-width="1.6"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg>
        </div>
        <div class="option-text">
          <div class="option-title">Barber Shop</div>
          <div class="option-sub">Apni dukan register / login</div>
        </div>
        <div class="radio unselected" id="radio-barber"></div>
      </div>
    </div>
  </div>

  <div class="cta-wrap">
    <button class="cta-btn" onclick="goAhead()">Aage badho →</button>
  </div>
</div>

<script>
let selected = 'customer';

function select(type){
  selected = type;
  // Customer card
  document.getElementById('card-customer').className = 'option-card ' + (type==='customer' ? 'selected' : '');
  document.getElementById('radio-customer').className = 'radio ' + (type==='customer' ? 'selected' : 'unselected');
  document.getElementById('radio-customer').innerHTML = type==='customer' ? '<div class="radio-dot"></div>' : '';
  // Barber card
  document.getElementById('card-barber').className = 'option-card ' + (type==='barber' ? 'selected' : '');
  document.getElementById('radio-barber').className = 'radio ' + (type==='barber' ? 'selected' : 'unselected');
  document.getElementById('radio-barber').innerHTML = type==='barber' ? '<div class="radio-dot"></div>' : '';
}

function goAhead(){
  if(selected === 'customer'){
    window.location.href = 'customer/index.html';
  } else {
    window.location.href = 'shopkeeper/index.html';
  }
}
</script>
</body>
</html>
